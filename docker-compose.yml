services:
  relay:
    build:
      context: .
      dockerfile: Dockerfile.relay
    restart: unless-stopped
    ports:
      - "443:8443"
    environment:
      RELAY_BIND: 0.0.0.0:8443
      RELAY_DOMAIN: ${RELAY_DOMAIN:?Set RELAY_DOMAIN in .env}
      TLS_CERT: /certs/fullchain.pem
      TLS_KEY: /certs/privkey.pem
      RUST_LOG: ${RUST_LOG:-info}
    volumes:
      - ${TLS_CERT_PATH:?Set TLS_CERT_PATH in .env}:/certs/fullchain.pem:ro
      - ${TLS_KEY_PATH:?Set TLS_KEY_PATH in .env}:/certs/privkey.pem:ro
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "--show-error", "--insecure", "https://127.0.0.1:8443/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
