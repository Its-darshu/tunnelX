name: Release

# Builds the `tunnelx` client for Linux, macOS (Intel + Apple Silicon) and
# Windows, then attaches the binaries to a GitHub Release. Trigger by pushing
# a version tag, e.g.  `git tag v0.1.0 && git push origin v0.1.0`.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: tunnelx-linux-x86_64
          - os: macos-13
            target: x86_64-apple-darwin
            asset: tunnelx-macos-x86_64
          - os: macos-14
            target: aarch64-apple-darwin
            asset: tunnelx-macos-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset: tunnelx-windows-x86_64.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build client
        run: cargo build --release -p client --target ${{ matrix.target }}

      - name: Stage binary (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cp "target/${{ matrix.target }}/release/tunnelx" "${{ matrix.asset }}"

      - name: Stage binary (windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cp "target/${{ matrix.target }}/release/tunnelx.exe" "${{ matrix.asset }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
